name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt update && sudo apt install -y libreadline-dev
    - name: build nob
      run: cc -o nob nob.c
    - name: build mysh
      run: ./nob
    - name: get-version
      run: ./mysh -v > /temp/version.txt
    - name: print-version
      run: cat /temp/version.txt
