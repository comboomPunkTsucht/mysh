name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: add dependecies
      uses: ConorMacBride/install-package@v1.1.0
      with:
        apt: libreadline
    - name: build nob
      run: cc -o nob nob.c
    - name: build mysh
      run: ./nob
